services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: sqlite:///./thai_agri.db
      NABC_BASE_URL: https://agriapi.nabc.go.th
      REQUEST_TIMEOUT_SECONDS: 20
      CORS_ORIGINS: http://localhost:5173
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
